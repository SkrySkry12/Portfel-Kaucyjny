name: iOS Build (Expo Prebuild in CI)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g expo-cli

      - name: Generate iOS project (Expo Prebuild)
        run: npx expo prebuild --platform ios

      - name: List generated iOS files (DEBUG)
        run: ls -R ios

      - name: Install CocoaPods
        run: |
          cd ios
          pod install

      - name: Find workspace name
        id: scheme
        run: |
          cd ios
          echo "WORKSPACE=$(ls *.xcworkspace | head -n 1)" >> $GITHUB_ENV

      - name: Build iOS (Xcode)
        run: |
          cd ios
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$(basename "$WORKSPACE" .xcworkspace)" \
            -configuration Release \
            -sdk iphoneos \
            build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build