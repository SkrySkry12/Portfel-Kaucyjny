name: iOS Build Stable

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Install Expo CLI
        run: npm install -g expo-cli

      # 🔥 GENERUJE IOS NA MACOS
      - name: Expo prebuild (ios)
        run: npx expo prebuild --platform ios

      # 🔥 SPRAWDZAMY CO POWSTAŁO
      - name: List ios folder
        run: ls ios

      - name: Install pods
        run: |
          cd ios
          pod install

      # 🔥 ZNAJDŹ WORKSPACE
      - name: Detect workspace
        run: |
          echo "WORKSPACE=$(ls ios/*.xcworkspace | head -n 1)" >> $GITHUB_ENV

      # 🔥 ZNAJDŹ SCHEME AUTOMATYCZNIE (POPRAWNIE)
      - name: Detect scheme
        run: |
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV

      # 🔥 BUILD
      - name: Build iOS
        run: |
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build