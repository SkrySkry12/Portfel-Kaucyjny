name: iOS Build FIXED (No Path Assumption)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      # 🔥 WAŻNE: prebuild NA ROOT, nie w ios
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean

      # DEBUG: pokaż co powstało
      - name: Show structure
        run: ls -R

      - name: Install pods (only if ios exists)
        run: |
          if [ -d "ios" ]; then
            cd ios
            pod install
          fi

      # 🔥 NIE zakładamy ścieżki ios/...
      - name: Find workspace safely
        run: |
          WORKSPACE=$(find . -name "*.xcworkspace" | head -n 1)
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV
          echo "FOUND: $WORKSPACE"

      - name: List schemes (debug)
        run: |
          xcodebuild -list -workspace "$WORKSPACE"

      - name: Get scheme
        run: |
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | awk '/Schemes:/{getline; print $1}')
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV

      - name: Build iOS
        run: |
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            build