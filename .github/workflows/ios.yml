name: iOS Build (CI Only)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Force Expo prebuild (CI macOS)
        run: npx expo prebuild --platform ios --clean

      - name: Show generated ios
        run: ls -R ios || true

      - name: Install pods
        run: |
          cd ios
          pod install

      - name: Find workspace
        run: |
          echo "WORKSPACE=$(find ios -name '*.xcworkspace' | head -n 1)" >> $GITHUB_ENV

      - name: Build iOS (NO SCHEME GUESS)
        run: |
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            build