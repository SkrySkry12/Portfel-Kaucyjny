name: iOS Clean Build

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean

      - name: Show ios output
        run: ls -R ios || true

      - name: Install pods
        run: |
          cd ios
          pod install

      - name: Detect workspace
        run: |
          echo "WORKSPACE=$(ls ios/*.xcworkspace | head -n 1)" >> $GITHUB_ENV

      - name: Detect scheme
        run: |
          echo "SCHEME=$(basename "$WORKSPACE" .xcworkspace)" >> $GITHUB_ENV

      - name: Build
        run: |
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            build