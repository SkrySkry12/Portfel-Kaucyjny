name: iOS Build Stable (Auto Scheme)

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  ios:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo prebuild (iOS)
        run: npx expo prebuild --platform ios --clean

      - name: Install pods
        run: |
          cd ios
          pod install

      - name: Find workspace
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" | head -n 1)
          echo "WORKSPACE=$WORKSPACE" >> $GITHUB_ENV

      # 🔥 NAJWAŻNIEJSZE: pobieramy realny scheme
      - name: Detect schemes
        run: |
          cd ios
          xcodebuild -list -workspace "$WORKSPACE"

      # 👉 ręcznie wybierany przez CI fallback (pierwszy scheme)
      - name: Set scheme automatically
        run: |
          SCHEME=$(xcodebuild -list -workspace "$WORKSPACE" | sed -n '/Schemes:/,$p' | tail -n +2 | head -n 1 | xargs)
          echo "SCHEME=$SCHEME" >> $GITHUB_ENV

      - name: Build iOS
        run: |
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: ios/build